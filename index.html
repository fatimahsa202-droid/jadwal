// ── INIT ──
function rebuildBase(){
  var all=ALL.filter(function(p){return p!=='Manager';});

  // Keep existing G1/G2 split, update members
  var grp1=G1.filter(function(p){return all.indexOf(p)>=0;});
  var grp2=G2.filter(function(p){return all.indexOf(p)>=0;});
  // Add new members not in any group
  all.forEach(function(p){
    if(grp1.indexOf(p)<0&&grp2.indexOf(p)<0){
      if(grp1.length<=grp2.length)grp1.push(p); else grp2.push(p);
    }
  });
  if(!grp1.length&&!grp2.length){
    grp1=all.slice(0,Math.ceil(all.length/2));
    grp2=all.slice(Math.ceil(all.length/2));
  } else if(!grp1.length){
    grp1=grp2.splice(0,Math.ceil(grp2.length/2));
  } else if(!grp2.length){
    grp2=grp1.splice(0,Math.ceil(grp1.length/2));
  }
  G1=grp1; G2=grp2;


  // ─── buildGroupSched ───────────────────────────────────────────
  // Distributes KM/KE, G, T among N people for 6 days
  // wOffset: 0 or 1 — flips assignment (for same-shift alternation)
  //
  // N=1: person gets G all week (Ground priority, no Call alone)
  // N=2: person0 gets [Sa,Su] then [We], person1 gets [Mo,Tu] then [Th]
  //       wOffset=0: p0=KM Sa/Su+We, p1=KM Mo/Tu+Th ... actually:
  //       slots = [Sa/Su, Mo/Tu, We, Th] — 4 slots for 2 people
  //       p0 slots: 0,2 (Sa/Su + We) = KM; p1 slots: 1,3 (Mo/Tu + Th) = KM
  //       remaining: p0 We=G if KM on Sa/Su... no — 
  //       Correct: day-pair assignment per person
  //       [Sa/Su] → p0, [Mo/Tu] → p1, [We] → p0, [Th] → p1
  //       wOffset=0: p0=KM on their days, p1=KM on their days → but who is G?
  //       Actually: p0 KM[Sa,Su] + G[We] + (no Th slot for p0 in morning... We only)
  //       Wait — 6 days, 2 people: each gets 3 days
  //       p0 owns: Sa, Su, We (days 0,1,4)
  //       p1 owns: Mo, Tu, Th (days 2,3,5)
  //       wOffset=0: p0=KM on Sa/Su, G on We | p1=KM on Mo/Tu, G on Th
  //       wOffset=1 (flip): p0=G on Sa/Su, KM on We | p1=G on Mo/Tu, KM on Th
  //
  // N=3: standard — [Sa/Su] [Mo/Tu] [We/Th] one pair each
  //       p0=KM[Sa/Su]+G[Mo/Tu]+T[We/Th], p1=T[Sa/Su]+KM[Mo/Tu]+G[We/Th], p2=G[Sa/Su]+T[Mo/Tu]+KM[We/Th]
  //       wOffset rotates which pair gets KM
  //
  // N≥4: split into groups of 3 and handle extras as Ground/T

  function buildGroupSched(grp, callCode, wOffset){
    var n=grp.length;
    var s={};
    grp.forEach(function(p){s[p]=['G','G','G','G','G','G','V'];});

    if(n===0) return s;

    if(n===1){
      // Only one person: Ground all week (highest priority, no Call alone)
      s[grp[0]]=['G','G','G','G','G','G','V'];
      return s;
    }

    if(n===2){
      var p0=grp[0], p1=grp[1];
      // p0 owns days: 0(Sa),1(Su),4(We)
      // p1 owns days: 2(Mo),3(Tu),5(Th)
      // wOffset=0: KM on first 2 owned days, G on last owned day
      // wOffset=1: G on first 2 owned days, KM on last owned day (flip)
      var p0Days=[0,1,4]; // Sa,Su,We
      var p1Days=[2,3,5]; // Mo,Tu,Th
      if(wOffset%2===0){
        // p0: KM Sa/Su, G We | p1: KM Mo/Tu, G Th
        s[p0][0]=callCode;s[p0][1]=callCode;s[p0][4]='G';
        s[p1][2]=callCode;s[p1][3]=callCode;s[p1][5]='G';
      } else {
        // Flip: p0: G Sa/Su, KM We | p1: G Mo/Tu, KM Th
        s[p0][0]='G';s[p0][1]='G';s[p0][4]=callCode;
        s[p1][2]='G';s[p1][3]='G';s[p1][5]=callCode;
      }
      // Days not owned by person = not their shift (but they still work those days in G)
      // Actually in morning both work all 6 days, each covering their assigned location
      // Non-assigned days for p0: Mo(2),Tu(3),Th(5) → G
      // Non-assigned days for p1: Sa(0),Su(1),We(4) → G
      s[p0][2]='G';s[p0][3]='G';s[p0][5]='G'; // p0 Ground on p1's days
      s[p1][0]='G';s[p1][1]='G';s[p1][4]='G'; // p1 Ground on p0's days
      // Wait — that makes everyone Ground except their KM days. Correct!
      // p0: KM,KM,G,G,G,G (wOffset=0) — but We should be G not KM for p0 alone
      // Let me re-read the rule:
      // "Sa/Su one location, Mo/Tu second location, We one location, Th one location"
      // With 2 people: p0 covers Sa+Su+We, p1 covers Mo+Tu+Th
      // wOffset=0: p0=KM on Sa/Su/We (3 days KM??) — no that's too many
      // 
      // Re-reading user: "Sa/Su then Mo/Tu then We location Th location"
      // With 2 people alternating: p0 gets Sa/Su and We, p1 gets Mo/Tu and Th
      // wOffset=0: p0=KM[Sa,Su], G[We] | p1=KM[Mo,Tu], G[Th]
      //            (on We p0 is G, on Th p1 is G — the "other" person covers those)
      // wOffset=1: p0=G[Sa,Su], KM[We] | p1=G[Mo,Tu], KM[Th]
      //
      // Days where p0 is KM/G, what is p1 doing those days?
      // Both work ALL 6 days. On Sa/Su: p0=KM, p1=G (ground coverage)
      // On Mo/Tu: p1=KM, p0=G
      // On We: p0=G (wOffset=0), p1=? → p1 already did KM Mo/Tu, so p1=T or G
      // On Th: p1=G (wOffset=0), p0=? → p0 already did KM Sa/Su, so p0=T or G
      // 
      // Simplest: remaining days = G for both (Ground has priority)
      // So wOffset=0: p0=[KM,KM,G,G,G,G], p1=[G,G,KM,KM,G,G]
      // wOffset=1: p0=[G,G,G,G,KM,KM]... but We is day4, Th is day5
      //            p0=[G,G,KM,KM,G,G]?? No...
      //
      // User said: "Sa/Su إسراء, Mo/Tu زهراء, We إسراء, Th زهراء"
      // So the slot ownership is fixed: p0=Sa+Su+We, p1=Mo+Tu+Th
      // wOffset=0: on your days=KM, other days=G
      // wOffset=1: on your days=G (→ means other person takes KM on those)... 
      //   but if p0 is G on Sa/Su/We, then p1 must cover Call on those days
      //   p1 can't be KM on both their days AND p0's days
      // 
      // Correct interpretation (flip):
      // wOffset=0: p0=KM[Sa,Su,We], p1=KM[Mo,Tu,Th] → 3 KM days each, 3 G days each
      // wOffset=1: p0=G[Sa,Su,We]+KM later... 
      //   Actually: wOffset=1 means SWAP roles
      //   wOffset=0: p0=KM on p0Days, G on p1Days | p1=KM on p1Days, G on p0Days
      //   wOffset=1: p0=G on p0Days, KM on p1Days | p1=G on p1Days, KM on p0Days
      //   → This means p0 does G Sa/Su/We and KM Mo/Tu/Th (next same-shift week)
      // 
      // THIS IS CORRECT — alternating week by week!
      if(wOffset%2===0){
        p0Days.forEach(function(d){s[p0][d]=callCode;});
        p1Days.forEach(function(d){s[p0][d]='G';});
        p1Days.forEach(function(d){s[p1][d]=callCode;});
        p0Days.forEach(function(d){s[p1][d]='G';});
      } else {
        p1Days.forEach(function(d){s[p0][d]=callCode;});
        p0Days.forEach(function(d){s[p0][d]='G';});
        p0Days.forEach(function(d){s[p1][d]=callCode;});
        p1Days.forEach(function(d){s[p1][d]='G';});
      }
      s[p0][6]='V';s[p1][6]='V';
      return s;
    }

    if(n===3){
      // Standard: 3 day-pairs, one per person, rotate by wOffset
      var pairs=[[0,1],[2,3],[4,5]];
      var roles=[callCode,'G','T'];
      grp.forEach(function(p,pi){
        var callPair=(pi+wOffset)%3;
        for(var d=0;d<6;d++) s[p][d]='G';
        pairs[callPair].forEach(function(d){s[p][d]=callCode;});
        var gPair=(callPair+1)%3;
        var tPair=(callPair+2)%3;
        pairs[gPair].forEach(function(d){s[p][d]='G';});
        pairs[tPair].forEach(function(d){s[p][d]='T';});
        s[p][6]='V';
      });
      return s;
    }

    // N≥4: first 3 get standard rotation, rest get G
    var sub=grp.slice(0,3);
    var rest=grp.slice(3);
    var ss=buildGroupSched(sub,callCode,wOffset);
    Object.keys(ss).forEach(function(p){s[p]=ss[p];});
    rest.forEach(function(p){
      for(var d=0;d<6;d++) s[p][d]='G';
      s[p][6]='V';
    });
    return s;
  }

  function buildLate(grp){
    var late={};
    var n=grp.length;
    if(n===0) return late;
    // Distribute late days evenly: no back-to-back for same person
    // 6 days → patterns based on group size
    if(n===1){
      // One person covers all late slots
      late[grp[0]]=['Sa','Su','Mo','Tu','We','Th'];
    } else if(n===2){
      // 3 days each: Sa/Tu/Th and Su/Mo/We (no consecutive)
      late[grp[0]]=['Sa','Tu','Th'];
      late[grp[1]]=['Su','Mo','We'];
    } else {
      // 3+ people: standard Sa/Tu, Su/We, Mo/Th rotation
      var patterns=[['Sa','Tu'],['Su','We'],['Mo','Th']];
      grp.forEach(function(p,i){late[p]=patterns[i%3];});
    }
    return late;
  }

  var newBase=[];
  // (balance handled post-build)
  var g1SameShiftCount=0, g2SameShiftCount=0;

  for(var wi=0;wi<6;wi++){
    var isEven=(wi%2===0);
    var mGrp=isEven?grp1.slice():grp2.slice();
    var eGrp=isEven?grp2.slice():grp1.slice();

    // wOffset for same-shift alternation (0→1→2 for 3 people, 0→1 for 2 people)
    var mOff=isEven?g1SameShiftCount:g2SameShiftCount;
    var eOff=isEven?g2SameShiftCount:g1SameShiftCount;
    if(isEven) g1SameShiftCount++; else g2SameShiftCount++;

    var s=buildGroupSched(mGrp,'KM',mOff);
    var se=buildGroupSched(eGrp,'KE',eOff);
    Object.keys(se).forEach(function(p){s[p]=se[p];});

    // Friday: rotate through evening group
    var fri=eGrp[eOff%eGrp.length]||eGrp[0];
    if(s[fri]) s[fri][6]='F';

    // Previous week's fri person → Sa=V this week
    if(wi>0){
      var prevFri=newBase[wi-1]&&newBase[wi-1].fri;
      if(prevFri&&s[prevFri]){
        s[prevFri][0]='V';
        // If they had KM on Sa, give them T on Su instead
        if(s[prevFri][1]===('KM')||s[prevFri][1]===('KE')){
          s[prevFri][1]='T';
        }
      }
    }

    // Early person: alternates through morning group
    var early=mGrp[mOff%mGrp.length]||mGrp[0];

    // Late: evening group
    var late=buildLate(eGrp);

    newBase.push({m:mGrp,e:eGrp,fri:fri,early:early,late:late,s:s});
  }

  BASE=newBase;
  // ── Balance Call: sort group so least-Call person alternates with most-Call ──
  // Uses BASE itself (just built) to compute month balance and swap as needed
  (function(){
    var now=new Date(), yr=now.getFullYear(), mo=now.getMonth();
    var dInM=new Date(yr,mo+1,0).getDate();
    // Compute expected Call days for each person across the full month
    // using the just-built BASE (no slotSt needed, just check BASE codes)
    var callExp={};
    all.forEach(function(p){callExp[p]=0;});
    for(var d=1;d<=dInM;d++){
      var dt=new Date(yr,mo,d);
      var dw=dt.getDay(), di2=dw===6?0:(dw===0?1:dw+1);
      if(di2<0||di2>5) continue;
      var wi2=getWI(dt), wb2=BASE[wi2%BASE.length];
      if(!wb2||!wb2.s) continue;
      all.forEach(function(p){
        var cd=wb2.s[p]&&wb2.s[p][di2];
        if(cd==='KM'||cd==='KE') callExp[p]=(callExp[p]||0)+1;
      });
    }
    // Find mean
    var total=0; all.forEach(function(p){total+=callExp[p]||0;});
    var mean=total/all.length;
    // For each person below mean: find a FUTURE week where they could swap Call days
    // with someone above mean in the SAME shift
    var today3=new Date(); today3.setHours(0,0,0,0);
    all.forEach(function(deficit){
      if((callExp[deficit]||0)>=mean) return;
      var need=Math.round(mean-(callExp[deficit]||0));
      // Find weeks in remaining month where deficit person is NOT on Call
      // but their shift-mate IS on Call — swap them
      for(var wi3=0;wi3<BASE.length&&need>0;wi3++){
        var wb3=BASE[wi3];
        if(!wb3||!wb3.s||!wb3.s[deficit]) continue;
        var isM3=(wb3.m||[]).indexOf(deficit)>=0;
        var callCode3=isM3?'KM':'KE';
        var grp3=isM3?(wb3.m||[]):(wb3.e||[]);
        // Check if this week has any future days in current month
        var hasFuture=false;
        for(var di3=0;di3<6;di3++){
          // Find date for this di3 in wi3
          // Approximate: scan month days
          for(var d2=1;d2<=dInM;d2++){
            var dt2=new Date(yr,mo,d2);
            if(dt2<=today3) continue;
            var dw2=dt2.getDay(), di4=dw2===6?0:(dw2===0?1:dw2+1);
            if(di4===di3&&getWI(dt2)===wi3){hasFuture=true;break;}
          }
          if(hasFuture) break;
        }
        if(!hasFuture) continue;
        // Find a day where deficit has G/T but surplus has KM/KE
        for(var di5=0;di5<6&&need>0;di5++){
          var defCode=wb3.s[deficit][di5];
          if(defCode===callCode3||defCode==='V'||defCode==='F') continue;
          // Find surplus person on Call this day
          var surplus=null;
          grp3.forEach(function(q){
            if(q===deficit) return;
            var qCode=wb3.s[q]&&wb3.s[q][di5];
            if(qCode===callCode3&&(callExp[q]||0)>mean) surplus=q;
          });
          if(!surplus) continue;
          // Check it's a future day
          var isFuture=false;
          for(var d3=1;d3<=dInM;d3++){
            var dt3=new Date(yr,mo,d3);
            if(dt3<=today3) continue;
            var dw3=dt3.getDay(), di6=dw3===6?0:(dw3===0?1:dw3+1);
            if(di6===di5&&getWI(dt3)===wi3){isFuture=true;break;}
          }
          if(!isFuture) continue;
          // Swap: give deficit the Call, give surplus the deficit's old code
          var defOldCode=wb3.s[deficit][di5];
          // Update BASE directly
          BASE[wi3].s[deficit][di5]=callCode3;
          BASE[wi3].s[surplus][di5]=defOldCode;
          callExp[deficit]=(callExp[deficit]||0)+1;
          callExp[surplus]=(callExp[surplus]||0)-1;
          need--;
          chgLog.unshift('[Call Balance] '+deficit+' swapped Call with '+surplus+' on di='+di5+' W'+wi3);
        }
      }
    });
  })();
  EARLY=newBase.map(function(w){return w.early;});
  cachedAssignments={};
  if(!window._mem)window._mem={};
  window._mem.roster={all:ALL.slice(),g1:G1.slice(),g2:G2.slice()};
  chgLog.unshift('[Schedule Rebuilt] '+all.join(', '));
  window._mem.chgLog=chgLog;
}

  overrides={};

  if(currentView==='admin')renderAdminView(mc);
  else if(currentView==='schedule')renderScheduleView(mc);
  else if(currentView==='tasks')renderTasksView(mc);
}
